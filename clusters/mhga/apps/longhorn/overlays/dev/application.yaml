apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/longhorn/longhorn
    targetRevision: v1.6.2
    path: deploy/longhorn
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - CreateNamespace=true
