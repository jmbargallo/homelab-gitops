apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: adguard-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:jmbargallo/homelab-gitops.git
    targetRevision: main
    path: clusters/mhga/apps/adguard/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: adguard
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - CreateNamespace=true
